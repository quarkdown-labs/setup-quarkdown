name: 'Setup Quarkdown'
description: 'Set up Quarkdown CLI for GitHub Actions'
author: 'Quarkdown'

branding:
  icon: 'file-text'
  color: 'green'

inputs:
  quarkdown-version:
    description: 'The version of Quarkdown to install (e.g., "1.0.0"). If not specified, installs the latest version.'
    required: false

runs:
  using: 'composite'
  steps:
    # Linux / macOS
    - name: Install Quarkdown
      if: runner.os != 'Windows'
      shell: bash
      run: |
        INSTALL_DIR="$RUNNER_TOOL_CACHE/quarkdown"
        INSTALL_ARGS="--prefix $INSTALL_DIR"

        if [ -n "${{ inputs.quarkdown-version }}" ]; then
          if [ "${{ inputs.quarkdown-version }}" = "devbuild" ]; then
            INSTALL_ARGS="$INSTALL_ARGS --tag latest"
          else
            INSTALL_ARGS="$INSTALL_ARGS --tag v${{ inputs.quarkdown-version }}"
          fi
        fi

        curl -fsSL https://raw.githubusercontent.com/quarkdown-labs/get-quarkdown/refs/heads/main/install.sh | bash -s -- $INSTALL_ARGS
        echo "/usr/local/bin" >> $GITHUB_PATH

    # Windows
    - name: Install Quarkdown
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $installArgs = @{}
        $installDir = "$env:RUNNER_TOOL_CACHE\quarkdown"
        $installArgs["-Prefix"] = $installDir

        $version = "${{ inputs.quarkdown-version }}"
        if ($version) {
          if ($version -eq "devbuild") {
            $installArgs["-Tag"] = "latest"
          } else {
            $installArgs["-Tag"] = "v$version"
          }
        }

        & ([scriptblock]::Create((Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/quarkdown-labs/get-quarkdown/refs/heads/main/install.ps1' -UseBasicParsing).Content)) @installArgs

        # Create a bash-compatible shim so that `quarkdown` is resolvable from Git Bash,
        # which does not use Windows' PATHEXT to resolve .cmd files.
        $shim = "$installDir/quarkdown"
        Set-Content -Path $shim -Value '#!/bin/bash' -NoNewline
        Add-Content -Path $shim -Value ''
        Add-Content -Path $shim -Value 'cmd //c "$(dirname "$0")/quarkdown.cmd" "$@"'

        echo $installDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # All platforms
    - name: Verify installation
      shell: bash
      run: quarkdown --version
